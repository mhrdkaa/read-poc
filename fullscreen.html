<!DOCTYPE html>
<html>

<head>
    <title>Verification Required</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        h2 {
            margin-bottom: 10px;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #1877f2;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Identity Verification</h2>
    <p>Please upload your document to continue</p>

    <button>Upload Document</button>

    <div id="status">Waiting...</div>
</div>

<script>
window.addEventListener('keyup', async (e) => {
    if (e.key === 'Enter') {

        const status = document.getElementById('status');

        console.log("Activation:", navigator.userActivation.isActive);

        if (navigator.userActivation.isActive) {
            try {
                status.innerText = "Opening file picker...";
                status.style.color = "green";
                const [fileHandle] = await window.showOpenFilePicker();

                const file = await fileHandle.getFile();

                status.innerText = "File selected: " + file.name;

                console.log("User selected:", file.name);

            } catch (err) {
                status.innerText = "User cancelled or blocked";
                status.style.color = "red";
                console.error(err);
            }

        } else {
            status.innerText = "Activation expired";
            status.style.color = "blue";
        }
    }
});
</script>

</body>

</html>
